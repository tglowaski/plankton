# Pre-commit hooks for code quality enforcement
# Install: uv add --dev pre-commit
#   && uv run pre-commit install --hook-type pre-commit --hook-type commit-msg
#     --hook-type pre-push
# Pre-push only: uv run pre-commit install --hook-type pre-push
# Run (repo-wide baseline): SKIP=plankton-strict-runtime-commit uv run pre-commit run --all-files

default_stages: [pre-commit, pre-push]

repos:
  - repo: local
    hooks:
      # === PHASE 1: FORMATTING ===
      - id: ruff-format
        name: ruff (format)
        entry: uv run ruff format --force-exclude
        language: system
        types: [python]

      # === PHASE 2: LINTING ===
      - id: ruff-check
        name: ruff (lint)
        entry: uv run ruff check --fix --force-exclude
        language: system
        types: [python]

      # === PHASE 1a: TS FORMATTING ===
      - id: biome-format
        name: biome (format)
        entry: bash -c 'command -v biome >/dev/null 2>&1 || exit 0; biome format --write "$@"' --
        language: system
        files: \.(jsx?|tsx?|cjs|cts|mjs|mts|css)$

      # === PHASE 2a: TS LINTING ===
      - id: biome-lint
        name: biome (lint)
        entry: bash -c 'command -v biome >/dev/null 2>&1 || exit 0; biome lint --write "$@"' --
        language: system
        files: \.(jsx?|tsx?|cjs|cts|mjs|mts|css)$

      # === PHASE 2b: ASYNC LINTING ===
      - id: flake8-async
        name: flake8-async (async patterns)
        entry: uv run flake8 --select=ASYNC
        language: system
        types: [python]
        exclude: ^(tests/|scripts/|docs/)

      # === PHASE 3: TYPE CHECKING ===
      - id: ty-check
        name: ty (types)
        entry: uv run ty check
        language: system
        types: [python]
        exclude: ^(scripts/|docs/|tests/)
        require_serial: true

  # === PHASE 4: SHELL (pinned binary — consistent across macOS/Linux) ===
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        types: [shell]

  # === PHASE 7: TOML (pinned binary via pip) ===
  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-lint

  # === PHASE 8b: ACTIONLINT (pinned binary) ===
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint

  - repo: local
    hooks:
      # === PHASE 5: YAML ===
      - id: yamllint
        name: yamllint
        entry: uv run yamllint -c .yamllint
        language: system
        types: [yaml]

      # === PHASE 6: JSON ===
      - id: check-json
        name: jaq (json syntax)
        entry: bash -c 'command -v jaq >/dev/null 2>&1 || exit 0; for f in "$@"; do jaq empty "$f" || exit 1; done' --
        language: system
        types: [json]

      # === PHASE 8: DOCKERFILE ===
      - id: hadolint
        name: hadolint
        entry: bash -c 'command -v hadolint >/dev/null 2>&1 || exit 0; hadolint "$@"' --
        language: system
        files: (^|/)Dockerfile(\..*)?$|\.dockerfile$

      # === PHASE 8a: GITHUB ACTIONS SCHEMA ===
      - id: check-jsonschema-github-workflows
        name: check-jsonschema (GitHub Workflows)
        entry: uv run check-jsonschema --builtin-schema github-workflows
        language: system
        files: ^\.github/workflows/.*\.ya?ml$

      # === PHASE 10: DUPLICATES ===
      - id: jscpd
        name: jscpd (duplicates)
        entry: npx jscpd --config .jscpd.json --threshold 5
        language: system
        files: \.(py|sh|yaml|yml|ts|tsx|js|jsx|mjs|cjs|css)$
        pass_filenames: false
        stages: [pre-commit]
        verbose: true

      # === RUNTIME-PARITY STRICT CHECKS (automatic on commit) ===
      - id: plankton-strict-runtime-commit
        name: plankton (strict runtime parity)
        entry: ./scripts/pre_commit_plankton_strict.sh
        language: system
        require_serial: true
        stages: [pre-commit]

      # === RUNTIME-PARITY STRICT CHECKS (manual re-run / explicit override) ===
      - id: plankton-strict-runtime
        name: plankton (strict runtime parity)
        entry: ./scripts/pre_commit_plankton_strict.sh
        language: system
        require_serial: true
        stages: [manual]

      # === COMMIT MESSAGE POLICY ===
      - id: plankton-commit-msg
        name: plankton (commit message policy)
        entry: ./scripts/check_commit_message_no_ai_attribution.sh
        language: system
        stages: [commit-msg]

      # === HOOK TEST SUITE (before push) ===
      - id: plankton-hooks-pre-push
        name: plankton (hook test suite)
        entry: ./scripts/pre_push_plankton_hooks.sh
        language: system
        pass_filenames: false
        require_serial: true
        stages: [pre-push]

# === INTENTIONAL EXCLUSIONS ===
# The following tools run in CC hooks and/or CI but NOT in pre-commit:
# - markdownlint-cli2: pass_filenames=false causes it to scan gitignored docs/plans/
#   (auto-generated reports that don't conform to style rules); removed to reduce noise
# - vulture: High false positive rate, advisory-only (needs whitelist)
# - bandit: Security scanning belongs in CI gates, not commit-time
# - flake8-pydantic: Niche Pydantic feedback, real-time via CC hooks
# - semgrep: Session-scoped security scanning, 5-15s with --config auto
# - knip: Project-scoped dead code analysis, 10-60s too slow for commit
# - oxlint+tsgolint: Per-file type-aware lint, opt-in in CC hooks only
# - tsgo: Session-scoped type checking advisory, opt-in in CC hooks only
